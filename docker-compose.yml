services:
  aideclarant:
    build:
      context: ./web_app
    environment:
      APP_ROOT_PATH: ${APP_ROOT_PATH:-/aideclarant}
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY}
      GIGACHAT_AUTH_URL: ${GIGACHAT_AUTH_URL:-https://ngw.devices.sberbank.ru:9443/api/v2/oauth}
      GIGACHAT_BASE_URL: ${GIGACHAT_BASE_URL:-https://gigachat.devices.sberbank.ru/api/v1}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_MODEL_DOCS: ${GIGACHAT_MODEL_DOCS:-GigaChat-2}
      GIGACHAT_MODEL_TNVED: ${GIGACHAT_MODEL_TNVED:-GigaChat-2}
      GIGACHAT_MODEL_DOCS_FALLBACKS: ${GIGACHAT_MODEL_DOCS_FALLBACKS:-GigaChat-Pro,GigaChat-Max}
      GIGACHAT_MODEL_TNVED_FALLBACKS: ${GIGACHAT_MODEL_TNVED_FALLBACKS:-GigaChat-Pro,GigaChat-Max}
      GIGACHAT_VERIFY_SSL: ${GIGACHAT_VERIFY_SSL:-true}
      GIGACHAT_CA_BUNDLE_FILE: ${GIGACHAT_CA_BUNDLE_FILE:-/certs/russian_trusted_root_ca_pem.crt}
    volumes:
      - ./certs:/certs:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./site/frontend
    environment:
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-https://aiddoc.ru}
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-/api/v1}
      NUXT_API_BASE_URL: ${NUXT_API_BASE_URL:-http://backend:8000/api/v1}
      NUXT_PUBLIC_CTA_URL: ${NUXT_PUBLIC_CTA_URL:-https://aiddoc.ru/aideclarant}
      NUXT_PUBLIC_YANDEX_METRIKA_ID: ${NUXT_PUBLIC_YANDEX_METRIKA_ID:-}
      NUXT_PUBLIC_GOOGLE_TAG_ID: ${NUXT_PUBLIC_GOOGLE_TAG_ID:-}
    restart: unless-stopped

  backend:
    build:
      context: ./site/backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/aiddoc_landing}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost","http://localhost:8080","https://aiddoc.ru"]}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-too}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-720}
      LANDING_CTA_URL: ${LANDING_CTA_URL:-https://aiddoc.ru/aideclarant}
      PUBLIC_RATE_LIMIT: ${PUBLIC_RATE_LIMIT:-20/minute}
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiddoc_landing}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - aideclarant
      - frontend
      - backend
    volumes:
      - ./site/infra/nginx/conf.d/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
