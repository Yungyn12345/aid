<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AIDDoc | АИ Декларант{% endblock %}</title>
    <meta name="description" content="AIDDoc помогает ВЭД-командам готовить декларации и документы быстрее за счет ИИ-ассистента.">
    <link rel="icon" href="{{ url_for('static', filename='img/Union.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block head %}{% endblock %}
  </head>
  <body>
    {% block content %}{% endblock %}
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
  </body>
</html>
